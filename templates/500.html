<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue-Cure | Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; padding: 20px;
        }
        .container { text-align: center; max-width: 480px; }
        .code {
            font-size: 120px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #dc2626, #f97316);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 16px;
        }
        .icon { font-size: 56px; margin-bottom: 20px; opacity: 0.7; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { font-size: 15px; color: #94a3b8; line-height: 1.7; margin-bottom: 32px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 10px;
            font-size: 14px; font-weight: 700; text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: #2563eb; color: white; margin-right: 10px; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-ghost { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-ghost:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <div class="code">500</div>
        <h1>Server Error</h1>
        <p>Something went wrong on our end. Our team has been notified. Please try again in a moment.</p>
        <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Go to Dashboard</a>
        <a href="javascript:location.reload()" class="btn btn-ghost"><i class="fas fa-rotate-right"></i> Try Again</a>
    </div>
</body>
</html>
